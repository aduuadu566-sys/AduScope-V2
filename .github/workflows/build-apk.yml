name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgles2-mesa-dev xorg-dev ninja-build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses (Fix for Licenses Error)
        run: |
          mkdir -p -v "$ANDROID_SDK_ROOT/licenses"
          echo -e "\n2c4a34e8d4f11933d36e93902d67d480e3096b08\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f291d\n35105006d6494e6312cf4115179553fe9101c60f\ne9ac30d355da19283111b457653d8b695b72973e\n986585c539845da543a145ee0d0da2400e14d1a9\n24333f1a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          yes | flutter doctor --android-licenses || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the APK
        run: |
          flet build apk

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: AduScope-APK
          path: build/apk/*.apk
