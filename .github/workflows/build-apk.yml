name: Build AduScope APK

# Runs automatically every time you push code to GitHub, and can also
# be triggered manually from the "Actions" tab with the button
# "Run workflow".
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Flutter (matches Flet 0.28.3's modern build template)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux desktop libs (flet's build check needs "flutter doctor" fully clean, even for Android-only builds)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev mesa-utils

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor (diagnostic — helps debug future failures)
        run: flutter doctor -v

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Bake the API key into config.py (env vars set here don't survive into the compiled APK)
        run: sed -i "s|__OPENROUTER_API_KEY__|${{ secrets.OPENROUTER_API_KEY }}|" config.py

      - name: Build the APK
        run: flet build apk --project "AduScope" --product "AduScope"

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: aduscope-apk
          path: build/apk/*.apk
