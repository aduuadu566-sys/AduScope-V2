name: Build AduScope APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Flutter (pinned to a version compatible with Flet's Android build template)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Install Linux desktop libs (flet's build check needs "flutter doctor" fully clean, even for Android-only builds)
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev mesa-utils

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor (diagnostic — helps debug future failures)
        run: flutter doctor -v

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build the APK
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: flet build apk

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: aduscope-apk
          path: build/apk/*.apk
