name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linux Dependencies (Fix for Flet/Flutter)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgles2-mesa-dev xorg-dev ninja-build

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the APK
        run: |
          # Flet አፑን ወደ አንድሮይድ የሚቀይረው ትዕዛዝ
          flet build apk

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: AduScope-APK
          path: build/apk/*.apk
